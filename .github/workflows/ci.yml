name: CI
on: [push]
jobs:
  build:
    name: CI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/setup-go@v6
      with:
        go-version: "1.26"
    - uses: actions/checkout@v6
    - name: Check formatting
      run: diff -u <(echo -n) <(gofmt -d .)
    - name: Run go test
      run: go test -v
